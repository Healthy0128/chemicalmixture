<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>物質化合シミュレーター</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#111827;-webkit-text-size-adjust:100%}header{padding:16px 12px 8px;text-align:center}h1{margin:0;font-size:24px}p{margin:8px auto 0;max-width:900px;color:#6b7280;font-size:14px;line-height:1.6}main{max-width:1200px;margin:0 auto;padding:10px 10px 30px}.grid{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:980px){.grid{grid-template-columns:290px 1fr 330px}}.card{background:#fff;border:1px solid #d1d5db;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}.card h2{margin:0;padding:12px;font-size:18px;background:#eef2ff;border-bottom:1px solid #d1d5db}.inner{padding:12px}.tabs{display:flex;gap:6px;margin-bottom:10px}.tab{flex:1;border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:9px 4px;font-weight:800}.tab.active{background:#2563eb;color:#fff;border-color:#2563eb}.shelf{display:grid;grid-template-columns:1fr 1fr;gap:8px}.item{border:1px solid #cbd5e1;background:#fff;border-radius:12px;padding:9px;min-height:56px;text-align:center;cursor:pointer;user-select:none;touch-action:manipulation}.item:active{transform:scale(.98)}.symbol{font-size:20px;font-weight:900;line-height:1.1}.name{font-size:12px;color:#6b7280;margin-top:3px}.lab{min-height:270px;border:2px dashed #cbd5e1;border-radius:16px;background:#f8fafc;padding:12px}.lab-title{font-weight:900;margin-bottom:8px}.bench{display:flex;flex-wrap:wrap;gap:8px;min-height:130px;align-content:flex-start}.token{border:1px solid #93c5fd;background:#dbeafe;color:#1e3a8a;border-radius:999px;padding:8px 11px;font-weight:900;display:inline-flex;align-items:center;gap:6px}.token.compound{border-color:#86efac;background:#dcfce7;color:#166534}.token button{border:none;background:rgba(255,255,255,.75);border-radius:999px;font-weight:900;min-width:22px;height:22px;padding:0}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}@media(min-width:520px){.actions{grid-template-columns:repeat(4,1fr)}}button{appearance:none;-webkit-appearance:none;border:1px solid #cbd5e1;background:#fff;color:#111827;border-radius:11px;padding:11px 8px;min-height:44px;font-weight:900;font-size:14px}button.primary{background:#2563eb;color:#fff;border-color:#2563eb}button.action-btn.active{background:#f97316;color:#fff;border-color:#fb923c;box-shadow:0 0 0 3px rgba(251,146,60,.25)}button.reset-book{background:#f3f4f6;color:#374151}button.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.result{margin-top:12px;border:1px solid #d1d5db;border-radius:14px;padding:12px;background:#fff}.result-title{font-weight:900;font-size:18px;margin-bottom:6px}.result.success{border-color:#86efac;background:#f0fdf4}.result.fail{border-color:#fecaca;background:#fef2f2}.result small{color:#6b7280;display:block;margin-top:6px;line-height:1.5}.stage{position:relative;min-height:78px;margin-top:10px;border-radius:14px;background:#0f172a;overflow:hidden;display:flex;align-items:center;justify-content:center;color:white}.stage.idle{background:#e5e7eb;color:#6b7280}.stage .emoji{font-size:36px;animation:pop .45s ease}.stage.heat{background:linear-gradient(180deg,#451a03,#7c2d12,#f97316)}.stage.ignite{background:radial-gradient(circle,#fef08a 0,#f97316 35%,#7f1d1d 70%)}.stage.electric{background:linear-gradient(135deg,#1e1b4b,#2563eb,#67e8f9)}.stage.cool{background:linear-gradient(135deg,#e0f2fe,#38bdf8,#0f172a)}.stage.water{background:linear-gradient(135deg,#dbeafe,#38bdf8,#1d4ed8)}.stage.mix{background:linear-gradient(135deg,#4c1d95,#7c3aed,#c084fc)}.particle{position:absolute;width:9px;height:9px;border-radius:50%;background:white;opacity:.8;animation:float 1.2s ease-out forwards}.spark{position:absolute;font-size:22px;animation:spark 1s ease-out forwards}.flame{position:absolute;font-size:28px;animation:flame 1s ease-in-out infinite alternate}.bubble{position:absolute;font-size:22px;animation:bubble 1.4s ease-out forwards}@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}@keyframes float{0%{transform:translate(0,0) scale(.7);opacity:.9}100%{transform:translate(var(--x),var(--y)) scale(1.4);opacity:0}}@keyframes spark{0%{transform:scale(.2) rotate(0);opacity:1}100%{transform:scale(1.8) rotate(180deg);opacity:0}}@keyframes flame{0%{transform:translateY(4px) scale(.95)}100%{transform:translateY(-5px) scale(1.1)}}@keyframes bubble{0%{transform:translateY(22px) scale(.5);opacity:0}30%{opacity:1}100%{transform:translateY(-42px) scale(1.4);opacity:0}}.missions{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}.mission{border:1px solid #e5e7eb;border-radius:12px;padding:9px;background:#fff}.mission.done{background:#dcfce7;border-color:#86efac}.mission-title{font-weight:900}.mission small{color:#6b7280}.book{display:grid;grid-template-columns:1fr;gap:8px;max-height:720px;overflow:auto;padding-right:2px}.entry{border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:#f9fafb}.entry.found{background:#fff;border-color:#86efac}.entry .top{display:flex;justify-content:space-between;gap:8px;align-items:center}.entry .formula{font-size:18px;font-weight:900}.badge{display:inline-block;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:900;background:#e5e7eb;color:#374151}.badge.found{background:#dcfce7;color:#166534}.entry small{display:block;color:#6b7280;margin-top:6px;line-height:1.5}.filter-row{display:flex;gap:8px;margin-bottom:10px}.filter-row input{flex:1;border:1px solid #cbd5e1;border-radius:10px;padding:10px;font-size:15px}.counter{color:#6b7280;font-size:13px;margin-bottom:8px}.footer-note{color:#6b7280;font-size:12px;line-height:1.6;margin-top:10px}
</style>
</head>
<body>
<header><h1>物質化合シミュレーター</h1><p>元素や物質を実験台に入れ、条件を選んで反応させます。成功すると図鑑に登録されます。化合物同士の反応もあります。</p></header>
<main><section class="grid"><div class="card"><h2>材料棚</h2><div class="inner"><div class="tabs"><button class="tab active" id="tabElements" onclick="showShelf('elements')">元素</button><button class="tab" id="tabCompounds" onclick="showShelf('compounds')">物質</button></div><div id="shelf" class="shelf"></div><div class="footer-note">材料をタップすると実験台に入ります。図鑑で見つけた物質も材料として使えます。</div></div></div><div class="card"><h2>実験台</h2><div class="inner"><div class="lab"><div class="lab-title">入っている材料</div><div id="bench" class="bench"></div></div><div class="actions"><button id="btn-mix" class="action-btn" onclick="setCondition('mix')">混合 🧪</button><button id="btn-heat" class="action-btn" onclick="setCondition('heat')">加熱 🔥</button><button id="btn-ignite" class="action-btn" onclick="setCondition('ignite')">点火 💥</button><button id="btn-electric" class="action-btn" onclick="setCondition('electric')">電気 ⚡</button><button id="btn-cool" class="action-btn" onclick="setCondition('cool')">冷却 ❄️</button><button id="btn-water" class="action-btn" onclick="setCondition('water')">水を加える 💧</button><button class="primary" onclick="react()">反応させる</button><button class="danger" onclick="clearBench()">実験台リセット</button></div><div id="conditionText" class="footer-note">条件：未選択</div><div id="stage" class="stage idle"><div class="emoji">⚗️</div></div><div id="result" class="result"><div class="result-title">結果</div>材料と条件を選んで「反応させる」を押してください。</div></div></div><div class="card"><h2>ミッション・図鑑</h2><div class="inner"><div class="missions" id="missions"></div><div class="filter-row"><input id="search" placeholder="図鑑を検索" oninput="renderBook()"><button class="reset-book" onclick="resetBook()">図鑑リセット</button></div><div id="counter" class="counter"></div><div id="book" class="book"></div></div></div></section></main>
<script>
const elements=[{id:"H",formula:"H",name:"水素"},{id:"O",formula:"O",name:"酸素"},{id:"C",formula:"C",name:"炭素"},{id:"N",formula:"N",name:"窒素"},{id:"Na",formula:"Na",name:"ナトリウム"},{id:"Cl",formula:"Cl",name:"塩素"},{id:"Mg",formula:"Mg",name:"マグネシウム"},{id:"Fe",formula:"Fe",name:"鉄"},{id:"Cu",formula:"Cu",name:"銅"},{id:"S",formula:"S",name:"硫黄"},{id:"Ca",formula:"Ca",name:"カルシウム"},{id:"Al",formula:"Al",name:"アルミニウム"},{id:"Zn",formula:"Zn",name:"亜鉛"},{id:"Ag",formula:"Ag",name:"銀"}];
const compounds=[{id:"H2",formula:"H₂",name:"水素"},{id:"O2",formula:"O₂",name:"酸素"},{id:"N2",formula:"N₂",name:"窒素"},{id:"H2O",formula:"H₂O",name:"水"},{id:"CO2",formula:"CO₂",name:"二酸化炭素"},{id:"CO",formula:"CO",name:"一酸化炭素"},{id:"NaCl",formula:"NaCl",name:"塩化ナトリウム"},{id:"HCl",formula:"HCl",name:"塩酸"},{id:"NaOH",formula:"NaOH",name:"水酸化ナトリウム"},{id:"CaOH2",formula:"Ca(OH)₂",name:"水酸化カルシウム"},{id:"CaCO3",formula:"CaCO₃",name:"炭酸カルシウム"},{id:"CaO",formula:"CaO",name:"酸化カルシウム"},{id:"MgO",formula:"MgO",name:"酸化マグネシウム"},{id:"CuO",formula:"CuO",name:"酸化銅"},{id:"FeS",formula:"FeS",name:"硫化鉄"},{id:"Fe2O3",formula:"Fe₂O₃",name:"酸化鉄"},{id:"SO2",formula:"SO₂",name:"二酸化硫黄"},{id:"NH3",formula:"NH₃",name:"アンモニア"},{id:"CuCl2",formula:"CuCl₂",name:"塩化銅"},{id:"AgCl",formula:"AgCl",name:"塩化銀"},{id:"ZnCl2",formula:"ZnCl₂",name:"塩化亜鉛"},{id:"Al2O3",formula:"Al₂O₃",name:"酸化アルミニウム"},{id:"CH4",formula:"CH₄",name:"メタン"},{id:"C6H12O6",formula:"C₆H₁₂O₆",name:"ブドウ糖"},{id:"H2CO3",formula:"H₂CO₃",name:"炭酸"}];
const allMaterials=[...elements,...compounds];
const recipes=[
{inputs:{H:2,O:1},condition:"ignite",out:"H2O",title:"水の生成",note:"水素と酸素は、ただ置くだけではなく点火で反応する。"},
{inputs:{C:1,O:2},condition:"ignite",out:"CO2",title:"炭素の燃焼",note:"炭素が燃えて二酸化炭素ができる。"},
{inputs:{C:1,O:1},condition:"ignite",out:"CO",title:"不完全燃焼",note:"酸素が少ないと一酸化炭素ができる。"},
{inputs:{Mg:1,O:1},condition:"heat",out:"MgO",title:"マグネシウムの燃焼",note:"マグネシウムが酸素と結びつく。"},
{inputs:{Cu:1,O:1},condition:"heat",out:"CuO",title:"銅の酸化",note:"銅を加熱すると黒色の酸化銅ができる。"},
{inputs:{Fe:2,O:3},condition:"heat",out:"Fe2O3",title:"鉄の酸化",note:"鉄が酸素と結びつく。"},
{inputs:{Fe:1,S:1},condition:"heat",out:"FeS",title:"硫化鉄の生成",note:"鉄と硫黄を加熱すると硫化鉄ができる。"},
{inputs:{S:1,O:2},condition:"heat",out:"SO2",title:"硫黄の燃焼",note:"硫黄が燃えて二酸化硫黄ができる。"},
{inputs:{Na:1,Cl:1},condition:"mix",out:"NaCl",title:"塩化ナトリウムの生成",note:"ナトリウムと塩素が結びつく。"},
{inputs:{H:1,Cl:1},condition:"mix",out:"HCl",title:"塩化水素の生成",note:"水に溶けると塩酸として扱われる。"},
{inputs:{Na:1,O:1,H:1},condition:"water",out:"NaOH",title:"水酸化ナトリウムの生成",note:"中学教材向けの簡略モデル。"},
{inputs:{N:1,H:3},condition:"mix",out:"NH3",title:"アンモニアの生成",note:"窒素と水素からアンモニアを作る簡略モデル。"},
{inputs:{Ca:1,C:1,O:3},condition:"mix",out:"CaCO3",title:"炭酸カルシウムの生成",note:"石灰石や貝殻などに含まれる物質。"},
{inputs:{Ca:1,O:1},condition:"heat",out:"CaO",title:"酸化カルシウムの生成",note:"カルシウムと酸素から酸化カルシウム。"},
{inputs:{CaO:1,H2O:1},condition:"water",out:"CaOH2",title:"石灰水のもと",note:"酸化カルシウムに水を加えると水酸化カルシウムになる。"},
{inputs:{CO2:1,CaOH2:1},condition:"mix",out:"CaCO3",title:"石灰水が白くにごる",note:"二酸化炭素と水酸化カルシウムで炭酸カルシウムができる。"},
{inputs:{HCl:1,NaOH:1},condition:"mix",out:"NaCl",also:["H2O"],title:"中和",note:"塩酸と水酸化ナトリウムで塩化ナトリウムと水ができる。"},
{inputs:{Cu:1,Cl:2},condition:"mix",out:"CuCl2",title:"塩化銅の生成",note:"銅と塩素の反応。"},
{inputs:{Ag:1,Cl:1},condition:"mix",out:"AgCl",title:"塩化銀の生成",note:"白い沈殿として扱われることがある。"},
{inputs:{Zn:1,Cl:2},condition:"mix",out:"ZnCl2",title:"塩化亜鉛の生成",note:"亜鉛と塩素の反応。"},
{inputs:{Al:2,O:3},condition:"heat",out:"Al2O3",title:"酸化アルミニウムの生成",note:"アルミニウムと酸素の反応。"},
{inputs:{C:1,H:4},condition:"mix",out:"CH4",title:"メタンの生成",note:"発展的な簡略モデル。"},
{inputs:{C:6,H:12,O:6},condition:"mix",out:"C6H12O6",title:"ブドウ糖の構成",note:"元素の数のイメージ用。実際の生成過程は簡略化。"},
{inputs:{H2O:1},condition:"electric",out:"H2",also:["O2"],title:"水の電気分解",note:"水を電気分解すると水素と酸素が発生する。"},
{inputs:{CuO:1,C:1},condition:"heat",out:"Cu",also:["CO2"],title:"酸化銅の還元",note:"酸化銅から酸素を取り除き、銅を取り出す。"},
{inputs:{Fe2O3:1,C:1},condition:"heat",out:"Fe",also:["CO2"],title:"酸化鉄の還元",note:"鉄を取り出す反応の簡略モデル。"},
{inputs:{CaCO3:1},condition:"heat",out:"CaO",also:["CO2"],title:"炭酸カルシウムの熱分解",note:"加熱すると酸化カルシウムと二酸化炭素に分かれる。"},
{inputs:{H2:1,O2:1},condition:"ignite",out:"H2O",title:"水素の燃焼",note:"水素と酸素が反応して水ができる。"},
{inputs:{CO2:1,H2O:1},condition:"cool",out:"H2CO3",title:"炭酸の生成",note:"発展。二酸化炭素が水に溶けるイメージ。"}
];
let shelfMode="elements", bench=[], condition="", found={};
let missionIds=["H2O","CO2","MgO","CuO","FeS","NaCl","CaCO3","H2","O2","Cu"];
function getMaterial(id){return allMaterials.find(x=>x.id===id)||{id,formula:id,name:id};}
function countInputs(list){let c={};list.forEach(id=>c[id]=(c[id]||0)+1);return c;}
function sameCounts(a,b){let ak=Object.keys(a).sort(),bk=Object.keys(b).sort();if(ak.length!==bk.length)return false;return ak.every(k=>a[k]===b[k]);}
function showShelf(mode){shelfMode=mode;document.getElementById("tabElements").className=mode==="elements"?"tab active":"tab";document.getElementById("tabCompounds").className=mode==="compounds"?"tab active":"tab";renderShelf();}
function renderShelf(){const shelf=document.getElementById("shelf");shelf.innerHTML="";let list=shelfMode==="elements"?elements:compounds.filter(c=>found[c.id]);if(shelfMode==="compounds"&&list.length===0){shelf.innerHTML='<div class="footer-note">まだ図鑑登録された物質がありません。</div>';return;}list.forEach(m=>{const div=document.createElement("div");div.className="item";div.onclick=()=>addToBench(m.id);div.innerHTML=`<div class="symbol">${m.formula}</div><div class="name">${m.name}</div>`;shelf.appendChild(div);});}
function addToBench(id){bench.push(id);renderBench();}
function removeFromBench(i){bench.splice(i,1);renderBench();}
function renderBench(){const box=document.getElementById("bench");box.innerHTML="";if(bench.length===0){box.innerHTML='<div class="footer-note">材料棚から元素や物質をタップしてください。</div>';return;}bench.forEach((id,i)=>{const m=getMaterial(id);const token=document.createElement("span");token.className="token "+(compounds.some(c=>c.id===id)?"compound":"");token.innerHTML=`${m.formula}<button onclick="removeFromBench(${i})">×</button>`;box.appendChild(token);});}
function setCondition(c){condition=c;const label={mix:"混合 🧪",heat:"加熱 🔥",ignite:"点火 💥",electric:"電気 ⚡",cool:"冷却 ❄️",water:"水を加える 💧"}[c];document.getElementById("conditionText").textContent="条件："+label;["mix","heat","ignite","electric","cool","water"].forEach(x=>{const b=document.getElementById("btn-"+x);if(b)b.className="action-btn"+(x===c?" active":"");});playStage(c,false);}
function clearBench(){bench=[];condition="";document.getElementById("conditionText").textContent="条件：未選択";["mix","heat","ignite","electric","cool","water"].forEach(x=>{const b=document.getElementById("btn-"+x);if(b)b.className="action-btn";});const s=document.getElementById("stage");s.className="stage idle";s.innerHTML='<div class="emoji">⚗️</div>';const r=document.getElementById("result");r.className="result";r.innerHTML='<div class="result-title">結果</div>材料と条件を選んで「反応させる」を押してください。';renderBench();}
function playStage(c,success){const s=document.getElementById("stage");if(!c){s.className="stage idle";s.innerHTML='<div class="emoji">⚗️</div>';return;}const emoji={mix:"🧪",heat:"🔥",ignite:"💥",electric:"⚡",cool:"❄️",water:"💧"}[c]||"⚗️";s.className="stage "+c;s.innerHTML='<div class="emoji">'+emoji+'</div>';let count=success?18:10;for(let i=0;i<count;i++){let span=document.createElement("span");if(c==="heat"){span.className="flame";span.textContent="🔥";}else if(c==="ignite"||c==="electric"){span.className="spark";span.textContent=c==="electric"?"⚡":"✨";}else if(c==="water"||c==="cool"){span.className="bubble";span.textContent=c==="cool"?"❄️":"💧";}else{span.className="particle";}span.style.left=(10+Math.random()*80)+"%";span.style.top=(20+Math.random()*55)+"%";span.style.setProperty("--x",(-60+Math.random()*120)+"px");span.style.setProperty("--y",(-60+Math.random()*20)+"px");s.appendChild(span);}if(success){setTimeout(()=>{const done=document.createElement("div");done.className="spark";done.textContent="✅";done.style.left="50%";done.style.top="45%";s.appendChild(done);},350);}}
function resetBook(){if(!confirm("図鑑の登録をリセットしますか？"))return;found={};save();renderShelf();renderBook();renderMissions();}
function react(){const inputCount=countInputs(bench);const match=recipes.find(r=>r.condition===condition&&sameCounts(r.inputs,inputCount));const rbox=document.getElementById("result");if(!condition){playStage("",false);rbox.className="result fail";rbox.innerHTML='<div class="result-title">条件がありません</div>混合・加熱・点火などの条件を選んでください。';return;}if(!match){playStage(condition,false);rbox.className="result fail";rbox.innerHTML='<div class="result-title">反応しません</div>材料・数・条件のどれかが合っていないようです。<small>同じ元素でも数が違うと別の結果になります。</small>';return;}playStage(condition,true);const outs=[match.out].concat(match.also||[]);outs.forEach(id=>found[id]=true);const outText=outs.map(id=>{const m=getMaterial(id);return `<span class="token compound">${m.formula}</span>`;}).join(" ");rbox.className="result success";rbox.innerHTML=`<div class="result-title">成功：${match.title}</div>${outText}<small>${match.note}</small>`;bench=outs;renderBench();renderShelf();renderBook();renderMissions();save();}
function renderMissions(){const box=document.getElementById("missions");box.innerHTML="";missionIds.forEach(id=>{const m=getMaterial(id);const div=document.createElement("div");div.className="mission "+(found[id]?"done":"");div.innerHTML=`<div class="mission-title">${found[id]?"達成":"未達成"}：${m.name}</div><small>${m.formula} を作って図鑑登録する</small>`;box.appendChild(div);});}
function renderBook(){const book=document.getElementById("book"),q=document.getElementById("search").value.trim().toLowerCase();const list=compounds.filter(m=>!q||m.name.toLowerCase().includes(q)||m.formula.toLowerCase().includes(q)||m.id.toLowerCase().includes(q));book.innerHTML="";list.forEach(m=>{const isFound=!!found[m.id];const related=recipes.find(r=>r.out===m.id||(r.also||[]).includes(m.id));const div=document.createElement("div");div.className="entry "+(isFound?"found":"");div.innerHTML=`<div class="top"><div><div class="formula">${isFound?m.formula:"？？？"}</div><div class="name">${isFound?m.name:"未発見の物質"}</div></div><span class="badge ${isFound?"found":""}">${isFound?"登録済み":"未発見"}</span></div><small>${isFound&&related?related.title+"："+related.note:"実験で作ると情報が表示されます。"}</small>`;book.appendChild(div);});const total=compounds.length,got=compounds.filter(m=>found[m.id]).length;document.getElementById("counter").textContent=`図鑑：${got} / ${total} 登録`;}
function save(){try{localStorage.setItem("chem-sim-found",JSON.stringify(found));}catch(e){}}
function load(){try{const raw=localStorage.getItem("chem-sim-found");if(raw)found=JSON.parse(raw)||{};}catch(e){}}
load();renderShelf();renderBench();renderBook();renderMissions();
</script>
</body>
</html>
